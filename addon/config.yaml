name: "Paketti Tracker"
version: "0.5.0"
slug: "paketti_tracker"
description: "Track Finnish postal packages with Posti support, email parsing, and MQTT sensor publishing"
url: "https://github.com/kontijuh/paketti-tracker"

arch:
  - aarch64
  - amd64
  - armv7

startup: application
boot: auto

ingress: true
ingress_port: 8099
panel_icon: "mdi:package-variant-closed"
panel_title: "Paketti Tracker"

options:
  poll_interval_minutes: 60
  email_poll_interval_minutes: 30
  log_level: "info"

schema:
  poll_interval_minutes: int
  email_poll_interval_minutes: int
  log_level: list(debug|info|warning|error)

ports_description:
  "8099/tcp": "Web interface (ingress)"

map:
  - data:rw

environment:
  PAKETTI_DATA_DIR: /data
